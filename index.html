<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Pendataan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 20px; }
        h3 { margin-top: 0; color: #1c1e21; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-size: 13px; font-weight: bold; color: #606770; display: block; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn-save { background: #28a745; }
        .btn-save:disabled { background: #cccccc; cursor: not-allowed; color: #666; }
        .btn-search { background: #007bff; }
        .item-hasil { background: #ffffff; padding: 15px; margin-bottom: 12px; border-left: 5px solid #007bff; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .copy-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .btn-copy-small { background: #6c757d; font-size: 11px; padding: 8px; flex: 1; min-width: 90px; border-radius: 6px; border: none; color: white; cursor: pointer; }
        .status-msg { text-align: center; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Input Data Baru</h3>
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama..." oninput="cekInput()">
        <label>Alamat</label>
        <input type="text" id="alamat" placeholder="Masukkan alamat..." oninput="cekInput()">
        <label>Tanggal Lahir</label>
        <input type="text" id="tgl_lahir" placeholder="Contoh: 01/01/2001" oninput="cekInput()">
        
        <button class="btn-save" id="btnSimpan" onclick="kirimData()" disabled>Simpan Data</button>
        <div id="statusSimpan" class="status-msg"></div>
    </div>

    <div class="box">
        <h3>Cari Data</h3>
        <input type="text" id="cariNama" placeholder="Ketik nama yang ingin dicari...">
        <button class="btn-search" id="btnCari" onclick="cariData()">Cari Sekarang</button>
        <div id="hasilPencarian"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxYNxZElo8c3IM7uB-9BG_ZEL5FCROzJkS6grJLHohAdLk-T2VT3s4dvYbsPqFaJJLM/exec';

        function cekInput() {
            const nama = document.getElementById('nama').value.trim();
            const alamat = document.getElementById('alamat').value.trim();
            const tgl = document.getElementById('tgl_lahir').value.trim();
            const btn = document.getElementById('btnSimpan');
            if (btn) {
                btn.disabled = (nama === "" || alamat === "" || tgl === "");
            }
        }

        async function kirimData() {
            const nama = document.getElementById('nama').value;
            const alamat = document.getElementById('alamat').value;
            const tgl = document.getElementById('tgl_lahir').value;
            const btn = document.getElementById('btnSimpan');
