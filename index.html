<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS - DATABASE</title>
    <style>
        /* HACKER THEME COLORS */
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0208;
            --terminal-gray: #1a1a1a;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: var(--neon-green);
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }

        .box { 
            background: var(--terminal-gray); 
            padding: 25px; 
            border-radius: 4px; 
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 20px; 
        }

        h3 { 
            margin-top: 0; 
            text-align: center; 
            font-size: 1.2rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--neon-green);
            padding-bottom: 10px;
        }

        label { font-size: 12px; display: block; margin-top: 10px; color: #008f11; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0 15px 0; 
            border: 1px solid #004400; 
            background: #000;
            color: var(--neon-green);
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none;
            font-family: 'Courier New', monospace;
        }

        input:focus { border-color: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); }
        
        button { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--neon-green);
            border-radius: 4px; 
            cursor: pointer; 
            color: var(--dark-bg); 
            background: var(--neon-green);
            font-weight: bold; 
            font-size: 15px; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { background: #00cc33; color: #000; box-shadow: 0 0 15px var(--neon-green); }
        button:disabled { background: #004400; color: #008f11; cursor: not-allowed; border-color: #002200; }
        
        .btn-search { background: transparent; color: var(--neon-green); }
        
        #hasilPencarian { margin-top: 20px; width: 100%; }
        
        .item-hasil { 
            background: #000; 
            padding: 15px; 
            margin-bottom: 12px; 
            border: 1px dashed var(--neon-green); 
            border-radius: 4px; 
        }

        .copy-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        
        .btn-copy-small { 
            background: transparent; 
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 10px; 
            padding: 6px; 
            flex: 1; 
            min-width: 90px;
        }
        
        .status-msg { text-align: center; font-size: 13px; margin-top: 10px; font-weight: bold; }
        
        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="box">
        <h3>> SYSTEM_INPUT</h3>
        <label>_ID_NAME</label>
        <input type="text" id="nama" placeholder="..." oninput="cekInput()" autocomplete="off">
        <label>_LOC_ADDR</label>
        <input type="text" id="alamat" placeholder="..." oninput="cekInput()" autocomplete="off">
        <label>_DOB_DATA</label>
        <input type="text" id="tgl_lahir" placeholder="..." oninput="cekInput()" autocomplete="off">
        
        <button class="btn-save" id="btnSimpan" onclick="kirimData()" disabled>EXECUTE_SEND</button>
        <div id="statusSimpan" class="status-msg"></div>
    </div>

    <div class="box">
        <h3>> DATABASE_QUERY</h3>
        <input type="text" id="cariNama" placeholder="Ketik nama target..." autocomplete="off">
        <button class="btn-search" id="btnCari" onclick="cariData()">SCAN_DATABASE</button>
        <div id="hasilPencarian"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxYNxZElo8c3IM7uB-9BG_ZEL5FCROzJkS6grJLHohAdLk-T2VT3s4dvYbsPqFaJJLM/exec';

        function cekInput() {
            const nama = document.getElementById('nama').value.trim();
            const alamat = document.getElementById('alamat').value.trim();
            const tgl = document.getElementById('tgl_lahir').value.trim();
            const btn = document.getElementById('btnSimpan');
            if (btn) {
                btn.disabled = (nama === "" || alamat === "" || tgl === "");
            }
        }

        async function kirimData() {
            const nama = document.getElementById('nama').value;
            const alamat = document.getElementById('alamat').value;
            const tgl = document.getElementById('tgl_lahir').value;
            const btn = document.getElementById('btnSimpan');
            const status = document.getElementById('statusSimpan');

            btn.disabled = true;
            btn.innerText = "UPLOADING...";

            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ nama: nama, alamat: alamat, tgl_lahir: tgl }) 
                });
                status.innerText = "> ACCESS GRANTED: DATA SAVED";
                document.getElementById('nama').value = "";
                document.getElementById('alamat').value = "";
                document.getElementById('tgl_lahir').value = "";
                cekInput();
            } catch (err) {
                status.innerText = "> ERROR: CONNECTION FAILED";
                btn.disabled = false;
            } finally {
                btn.innerText = "EXECUTE_SEND";
            }
        }

        async function cariData() {
            const input = document.getElementById('cariNama').value;
            const container = document.getElementById('hasilPencarian');
            const btn = document.getElementById('btnCari');

            if(!input) {
                alert("ENTRY REQUIRED");
                return;
            }

            container.innerHTML = "> SEARCHING...";
            btn.disabled = true;

            try {
                const response = await fetch(`${scriptURL}?nama=${encodeURIComponent(input)}`);
                const data = await response.json();

                if (data.length === 0) {
                    container.innerHTML = "> NO MATCH FOUND";
                } else {
                    container.innerHTML = "";
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'item-hasil';
                        div.innerHTML = `
                            <div style="font-size: 14px;">
                                [NAMA]: ${item.nama}<br>
                                [ALMT]: ${item.alamat}<br>
                                [LAHR]: ${item.tgl_lahir}
                            </div>
                            <div class="copy-container">
                                <button class="btn-copy-small" onclick="copyTeks('${item.nama}', 'Nama')">COPY_NAMA</button>
                                <button class="btn-copy-small" onclick="copyTeks('${item.alamat}', 'Alamat')">COPY_ADDR</button>
                                <button class="btn-copy-small" onclick="copyTeks('${item.tgl_lahir}', 'Lahir')">COPY_DOB</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (err) {
                container.innerHTML = "> CRITICAL ERROR: DATA UNREACHABLE";
            } finally {
                btn.disabled = false;
                btn.innerText = "SCAN_DATABASE";
            }
        }

        function copyTeks(teks, tipe) {
            navigator.clipboard.writeText(teks).then(() => {
                console.log(tipe + " COPIED");
            });
        }
    </script>
</body>
</html>
