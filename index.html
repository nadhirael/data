<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Data</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h3 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-size: 14px; color: #666; }
        input { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Input Data</h3>
    
    <label>Nama Lengkap</label>
    <input type="text" id="nama" placeholder="Contoh: Budi Santoso">
    
    <label>Alamat</label>
    <input type="text" id="alamat" placeholder="Contoh: Jakarta">
    
    <button type="button" id="btnSimpan" onclick="kirimData()">Simpan ke Spreadsheet</button>
    
    <div id="status"></div>
</div>

<script>
    async function kirimData() {
        const btn = document.getElementById('btnSimpan');
        const statusDiv = document.getElementById('status');
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxlqshqZ6qNtUdmbgH9WcVr1AtXbe9etXn2MxylSkbaKLh__0U9T5w8l29bhndoRaU5/exec';
        
        const nama = document.getElementById('nama').value;
        const alamat = document.getElementById('alamat').value;

        if (!nama || !alamat) {
            alert("Harap isi semua kolom!");
            return;
        }

        // Tampilan saat loading
        btn.disabled = true;
        btn.innerText = "Mengirim...";
        statusDiv.innerText = "Sedang memproses...";
        statusDiv.style.color = "blue";

        try {
            // Mengirim data menggunakan fetch (metode POST)
            // Kita gunakan mode 'no-cors' agar lebih lancar dengan Google Script
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama: nama, alamat: alamat })
            });

            // Karena no-cors, kita anggap sukses jika tidak ada error
            statusDiv.innerText = "Data berhasil dikirim!";
            statusDiv.style.color = "green";
            document.getElementById('nama').value = "";
            document.getElementById('alamat').value = "";
            
        } catch (error) {
            console.error('Error!', error.message);
            statusDiv.innerText = "Terjadi kesalahan.";
            statusDiv.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.innerText = "Simpan ke Spreadsheet";
        }
    }
</script>

</body>
</html>
