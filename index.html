<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS - DATABASE</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0208;
            --terminal-gray: #1a1a1a;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: var(--neon-green);
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
        }

        /* ANIMASI BACKGROUND MATRIX */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .box { 
            background: rgba(26, 26, 26, 0.9); 
            padding: 25px; 
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            width: 100%; 
            max-width: 450px; 
            margin-bottom: 20px;
            position: relative;
        }

        /* GLITCH EFFECT PADA JUDUL */
        .glitch {
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            position: relative;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
            25% { text-shadow: -2px 0 red, 2px 0 blue; }
            50% { text-shadow: 2px -2px red, -2px 2px blue; }
            100% { text-shadow: 0 0 var(--neon-green); }
        }

        label { font-size: 11px; color: #008f11; text-transform: uppercase; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 5px 0 15px 0; 
            border: 1px solid #004400; 
            background: #000;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            outline: none;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--neon-green);
            background: var(--neon-green);
            color: #000;
            font-weight: bold; 
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { box-shadow: 0 0 20px var(--neon-green); }
        button:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }

        .item-hasil { 
            border: 1px solid var(--neon-green); 
            padding: 10px; 
            margin-top: 10px; 
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .status-msg { font-size: 12px; margin-top: 10px; min-height: 15px; }

        /* SCANLINE ANIMATION */
        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: fixed;
            top: 0; z-index: 10;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div class="scanline"></div>

    <div class="box">
        <h3 class="glitch">> SYSTEM_INPUT</h3>
        <label>_NAME</label>
        <input type="text" id="nama" oninput="cekInput()" autocomplete="off">
        <label>_ADDR</label>
        <input type="text" id="alamat" oninput="cekInput()" autocomplete="off">
        <label>_DOB</label>
        <input type="text" id="tgl_lahir" oninput="cekInput()" autocomplete="off">
        
        <button id="btnSimpan" onclick="kirimData()" disabled>EXECUTE_SEND</button>
        <div id="statusSimpan" class="status-msg"></div>
    </div>

    <div class="box">
        <h3 class="glitch">> DB_SCANNER</h3>
        <input type="text" id="cariNama" placeholder="Ketik nama target...">
        <button id="btnCari" onclick="cariData()">SCAN_DATABASE</button>
        <div id="hasilPencarian"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxYNxZElo8c3IM7uB-9BG_ZEL5FCROzJkS6grJLHohAdLk-T2VT3s4dvYbsPqFaJJLM/exec';

        // ANIMASI MATRIX BACKGROUND
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(13, 2, 8, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // LOGIKA SISTEM
        function cekInput() {
            const n = document.getElementById('nama').value.trim();
            const a = document.getElementById('alamat').value.trim();
            const t = document.getElementById('tgl_lahir').value.trim();
            document.getElementById('btnSimpan').disabled = (n === "" || a === "" || t === "");
        }

        async function kirimData() {
            const btn = document.getElementById('btnSimpan');
            const status = document.getElementById('statusSimpan');
            btn.disabled = true;
            status.innerText = "> UPLOADING DATA...";
            
            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        nama: document.getElementById('nama').value, 
                        alamat: document.getElementById('alamat').value, 
                        tgl_lahir: document.getElementById('tgl_lahir').value 
                    }) 
                });
                status.innerText = "> ACCESS GRANTED: DATA SAVED";
                document.getElementById('nama').value = "";
                document.getElementById('alamat').value = "";
                document.getElementById('tgl_lahir').value = "";
                cekInput();
            } catch (err) {
                status.innerText = "> CONNECTION_ERROR";
            } finally {
                btn.disabled = false;
            }
        }

        async function cariData() {
            const input = document.getElementById('cariNama').value;
            const container = document.getElementById('hasilPencarian');
            if(!input) return alert("REQUIRED_FIELD");
            
            container.innerHTML = "> DECRYPTING DATA...";
            try {
                const response = await fetch(`${scriptURL}?nama=${encodeURIComponent(input)}`);
                const data = await response.json();
                container.innerHTML = "";
                if (data.length === 0) {
                    container.innerHTML = "> NO MATCH";
                } else {
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'item-hasil';
                        div.innerHTML = `
                            [NAME]: ${item.nama}<br>[ADDR]: ${item.alamat}<br>[DOB]: ${item.tgl_lahir}
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <button style="padding:2px; font-size:9px;" onclick="copyTeks('${item.nama}')">COPY_NAME</button>
                                <button style="padding:2px; font-size:9px;" onclick="copyTeks('${item.alamat}')">COPY_ADDR</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (err) { container.innerHTML = "> FETCH_ERROR"; }
        }

        function copyTeks(t) {
            navigator.clipboard.writeText(t);
            alert("COPIED TO CLIPBOARD");
        }
    </script>
</body>
</html>
